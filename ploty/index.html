<!DOCTYPE html>
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Graph2D Responsive</title>
<style>
* { box-sizing: border-box; }

body { background: #FFF; color: #222; font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; 
  width: min(100vh, 100vw); margin: 0 auto; padding: 1em 1em;
}

h1, h2, h3, h4, h5, h6, p { margin: 0 0 0.8em 0; text-align: left; }

button { display: block;
  margin: 0.5em auto; padding: 12px 16px; border: none; border-radius: 8px;
  font-size: 1rem; background: #2d6cdf; color: #fff; cursor: pointer;
}
button { width: 100%;} @media (min-width: 600px) { button { width: auto; min-width: 100px; } }
button:hover { background: #005fcc; } 

img, video { display: block; 
  margin: 10px auto; max-width: 100%; max-height: 100vh; }

.container { width: 100%; margin: 0 auto; }
canvas { display: block; 
  margin: 10px auto; width: 100%; height: auto;
  background: #fff; border: 1px solid #eee;
}

.inline { display: inline-block;
  margin: 5px; width: auto;
}
</style>
</head>
<body>

<h1>はじめに</h1>
<h2>第1章</h2>
<p>The quick brown fox jumps over the lazy dog. The quick brown fox jumps over the lazy dog. The quick brown fox jumps over the lazy dog.</p>
<div id="debug_text">--</div>

<button id="addPoint">点を追加</button>
<div class="container">
  <canvas id="graph"></canvas>
</div>

<script src="src/ploty.js"></script>
<script>
// =========================
// Plot2D使用例
// =========================
const canvas = document.getElementById("graph");
const plot = new Plot2D(canvas, 0.8, [0,0], [0,0]);
const axis_2nd = plot.addXAxis("X1 [ticks]", [-1.6, 8.6], undefined, 0);
axis_2nd.drawName(true);
plot.addSeries("dummy", "red", null, null, false, true);
plot.addSeries("dummy2", "blue", null, [0,0.5,0.75], undefined, undefined, axis_2nd);
plot.render();

function random(min, max) {
  return Math.random() * (max - min) + min;
}

function randomColor() {
  return `hsl(${Math.random() * 360}, 80%, 50%)`;
}

document.getElementById("addPoint").addEventListener("click", () => {
  const x = random(0, 10);
  const y = random(0, 1);

  plot.getSeries("dummy").addData(x, y);
  plot.getSeries("dummy2").addData(x, y);
  axis_2nd.setMinMax(axis_2nd.min()+0.1);
  plot.getSeries("dummy").drawPoints(!plot.getSeries("dummy").drawPoints());
  plot.getSeries("dummy2").delOldX();
  plot.render();
});
</script>

<div class="container">
  <canvas id="graph3d"></canvas>
</div>
<script>
// =========================
// Plot3D使用例
// =========================
const canvas3d = document.getElementById("graph3d");
const plot3d = new Plot3D(canvas3d, 1.0, [-1,1], [-1,1], [0,0]);
for(let y = -1; y <= 1.0001; y += 0.05) {
  const xs = [];
  const ys = [];
  const zs = [];
  const colors = [];
  for(let x = -1; x <= 1.0001; x += 0.05) {
    xs.push(x);
    ys.push(y);
    zs.push(x * x - y * y);
    const hue = ((y + 1) / 2) * 240;
    colors.push(`hsl(${hue}, 80%, 50%)`);
  }
  plot3d.addSeries(`y=${y.toFixed(2)}`, xs, ys, zs, colors);
}
plot3d.render();
</script>

</body>
</html>
